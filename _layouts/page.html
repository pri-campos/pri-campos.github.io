<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>
    {% if page.title %}{{ page.title }} · {% endif %}{{ site.title | default: "Priscila Campos" }}
  </title>

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script>
    (function () {

      const savedTheme = localStorage.getItem("theme");

      if (savedTheme === "dark") {

        document.documentElement.classList.add("theme-preload");

        document.addEventListener("DOMContentLoaded", function () {
          document.body.classList.add("dark-mode");
        });

      }

    })();
  </script>

</head>

<body>

  <main class="page-content" aria-label="Content">

    <div class="wrapper">

      <div class="top-bar">

        {% unless page.url == "/" %}
        <a href="{{ '/' | relative_url }}" class="home-link">
          ← Home
        </a>
        {% endunless %}

        <div class="theme-toggle-wrap">

          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">

            <!-- Moon icon -->
            <svg class="icon icon-moon" xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">

              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9"/>

            </svg>

            <!-- Sun icon -->
            <svg class="icon icon-sun" xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">

              <circle cx="12" cy="12" r="4"/>

              <line x1="12" y1="2" x2="12" y2="4"/>
              <line x1="12" y1="20" x2="12" y2="22"/>

              <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/>
              <line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/>

              <line x1="2" y1="12" x2="4" y2="12"/>
              <line x1="20" y1="12" x2="22" y2="12"/>

              <line x1="6.34" y1="17.66" x2="4.93" y2="19.07"/>
              <line x1="19.07" y1="4.93" x2="17.66" y2="6.34"/>

            </svg>

          </button>

        </div>

      </div>

      {{ content }}

    </div>

  </main>


  <script>

    document.addEventListener("DOMContentLoaded", function () {

      const button = document.getElementById("theme-toggle");

      const savedTheme = localStorage.getItem("theme");

      if (savedTheme === "dark") {
        document.body.classList.add("dark-mode");
      }

      if (button) {

        button.addEventListener("click", function () {

          document.body.classList.toggle("dark-mode");

          const isDark = document.body.classList.contains("dark-mode");

          localStorage.setItem("theme", isDark ? "dark" : "light");

        });

      }

    });

  </script>

</body>

</html>
